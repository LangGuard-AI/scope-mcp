# When this is `false` GitHub hides the "Open a blank issue" link on the
# chooser page. Anyone filing for SCOPE is filing about the data; the
# structured Data revision form keeps issues actionable.
blank_issues_enabled: false

contact_links:
  - name: Question, general feedback, or operational discussion
    url: mailto:scope-mcp@langguard.ai
    about: For questions that aren't a specific data revision proposal — usage help, integration questions, partnership discussion, etc. We read this inbox.
  - name: Sensitive disclosure (security, regulatory, customer-confidential)
    url: mailto:scope-mcp@langguard.ai
    about: Please email rather than open a public issue. Reach out and we'll route to the right person.
