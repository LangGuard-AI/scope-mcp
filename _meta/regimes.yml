# Canonical compliance regime allowlist for SCOPE
#
# This file is the single source of truth for the 26 compliance regime codes
# used throughout the scope-mcp project. All other lists (in SCHEMA.md, CONTRIBUTING.md,
# README.md, validators, etc.) should reference this file rather than duplicating the
# regime codes.
#
# When adding a new regime, update this file first, then regenerate references in other docs.

schema_version: 1
regimes:
  # Privacy
  - code: APPI
    name: Act on the Protection of Personal Information (Japan)
  - code: CCPA
    name: California Consumer Privacy Act
  - code: GDPR
    name: General Data Protection Regulation (EU)
  - code: LGPD
    name: Lei Geral de Proteção de Dados (Brazil)
  - code: PIPEDA
    name: Personal Information Protection and Electronic Documents Act (Canada)
  - code: PIPL
    name: Personal Information Protection Law (China)
  - code: POPIA
    name: Protection of Personal Information Act (South Africa)
  - code: UK_GDPR
    name: UK General Data Protection Regulation

  # Industry / sector data
  - code: COPPA
    name: Children's Online Privacy Protection Act
  - code: FERPA
    name: Family Educational Rights and Privacy Act
  - code: GLBA
    name: Gramm-Leach-Bliley Act
  - code: HIPAA
    name: Health Insurance Portability and Accountability Act
  - code: PCI
    name: Payment Card Industry Data Security Standard

  # Financial reporting
  - code: COSO
    name: Committee of Sponsoring Organizations Framework
  - code: SOX
    name: Sarbanes-Oxley Act

  # Security frameworks
  - code: ISO_27001
    name: ISO/IEC 27001 Information Security Management
  - code: NIST_CSF
    name: NIST Cybersecurity Framework
  - code: SOC2
    name: Service Organization Control 2

  # AI regulation
  - code: CO_AI_ACT
    name: Colorado Artificial Intelligence Transparency Act
  - code: EU_AI_ACT
    name: European Union Artificial Intelligence Act
  - code: ISO_42001
    name: ISO/IEC 42001 AI Management Systems
  - code: NIST_AI_RMF
    name: NIST AI Risk Management Framework

  # Sector-specific
  - code: FDA_PART_11
    name: FDA Part 11 Electronic Records
  - code: FEDRAMP
    name: Federal Risk and Authorization Management Program
  - code: NY_DFS_500
    name: New York Department of Financial Services 23 NYCRR 500
  - code: PSD2
    name: Payment Services Directive 2 (EU)
