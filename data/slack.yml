schema_version: "1.0"
platform: slack
display_name: Slack
source: langguard-editorial
updated: "2026-04"
actions:
  # ---------- Messaging ----------
  - id: slack.post_message
    object: Message
    action: post_message
    category: Messaging
    risk: low
    business_impact: "Posts as the integration/bot identity; expected channel communication."
    compliance: []
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP]

  - id: slack.post_message_as_user
    object: Message
    action: post_message_as_user
    category: Messaging
    risk: medium
    business_impact: "Impersonates a real user; downstream recipients cannot tell it is automated."
    compliance: [SOC2, ISO_27001]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP]

  - id: slack.upload_file
    object: File
    action: upload_file
    category: Messaging
    risk: medium
    business_impact: "Places content into a channel; depending on file, can leak regulated data."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP]

  # ---------- Channels ----------
  - id: slack.create_channel
    object: Channel
    action: create_channel
    category: Channels
    risk: low
    business_impact: "Adds a new conversation space; benign on its own."
    compliance: []
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP]

  - id: slack.archive_channel
    object: Channel
    action: archive_channel
    category: Channels
    risk: medium
    business_impact: "Removes active visibility of a channel; can hide relevant discussions from audit."
    compliance: [SOX, SOC2, ISO_27001]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP]

  - id: slack.invite_user_to_channel
    object: Channel
    action: invite_user_to_channel
    category: Channels
    risk: low
    business_impact: "Expands channel audience; risk scales with channel sensitivity."
    compliance: [SOC2]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP]

  # ---------- Data Access ----------
  - id: slack.read_channel_history
    object: Message
    action: read_channel_history
    category: Data Access
    risk: high
    business_impact: "Ingests historical conversations; often contains PII, customer data, and secrets."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2, ISO_27001]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP]

  - id: slack.read_direct_messages
    object: Message
    action: read_direct_messages
    category: Data Access
    risk: critical
    business_impact: "Reads private 1:1 and small-group conversations; may include regulated health or personnel data."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, HIPAA, SOC2, ISO_27001, NIST_CSF]
    sod_concern: true
    confidence: medium
    access_methods: [REST, MCP]

  - id: slack.export_workspace_data
    object: Export
    action: export_workspace_data
    category: Data Access
    risk: critical
    business_impact: "Bulk extraction of all messages and files; moves regulated data out of the controlled system."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, HIPAA, SOC2, ISO_27001, NIST_CSF]
    sod_concern: true
    confidence: medium
    access_methods: [REST, MCP]

  # ---------- Identity & Admin ----------
  - id: slack.invite_external_user_to_workspace
    object: User
    action: invite_external_user_to_workspace
    category: Identity & Admin
    risk: high
    business_impact: "Grants an outsider access to internal channels and files."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2, ISO_27001, NIST_CSF]
    sod_concern: true
    confidence: high
    access_methods: [REST, MCP]

  - id: slack.remove_user
    object: User
    action: remove_user
    category: Identity & Admin
    risk: high
    business_impact: "Revokes workspace access; can disrupt work or retaliate if misused."
    compliance: [SOC2, ISO_27001, NIST_CSF]
    sod_concern: true
    confidence: high
    access_methods: [REST, MCP]

  - id: slack.update_workspace_admin
    object: User
    action: update_workspace_admin
    category: Identity & Admin
    risk: critical
    business_impact: "Grants or revokes top-level admin privileges; privilege-escalation vector."
    compliance: [SOX, SOC2, ISO_27001, NIST_CSF]
    sod_concern: true
    confidence: high
    access_methods: [REST, MCP]
