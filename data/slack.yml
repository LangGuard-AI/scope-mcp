schema_version: "1.1"
platform: slack
display_name: Slack
source: langguard-editorial
updated: "2026-05"
# The official Slack MCP server (https://mcp.slack.com/mcp) is closed-source
# and gates `tools/list` behind OAuth. Slack's developer docs publish the tool
# surface only as plain-language capability labels in a docs table — verbatim
# tool identifiers are not publicly available. Per CONTRIBUTING.md Rule 1's
# escape hatch, every entry below uses `id_form: capability`. When a real
# `tools/list` capture becomes available, refresh this file to `id_form:
# verbatim` with the actual identifier strings.
reference: https://docs.slack.dev/ai/slack-mcp-server/developing
actions:
  # ---------- Messaging ----------
  - id: slack.send_message
    object: Message
    action: send_message
    id_form: capability
    description: "Send a message"
    category: Messaging
    risk: low
    business_impact: "Posts a message to a channel, thread, or DM as the authorized user; agent speech in Slack."
    compliance: []
    sod_concern: false
    confidence: medium
    access_methods: [REST, MCP]

  # ---------- Conversations ----------
  - id: slack.read_channel_or_thread
    object: Conversation
    action: read_channel_or_thread
    id_form: capability
    description: "Read a channel/thread"
    category: Conversations
    risk: medium
    business_impact: "Surfaces channel and thread history to the caller; private channel and DM history is personal communications data."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2, ISO_27001]
    sod_concern: false
    confidence: medium
    access_methods: [REST, MCP]

  - id: slack.search_messages
    object: Message
    action: search_messages
    id_form: capability
    description: "Search messages/channels"
    category: Conversations
    risk: high
    business_impact: "Cross-workspace message search returns DMs, private-channel content, and posts at scale; data-exfiltration vector for personal communications."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2, ISO_27001]
    sod_concern: false
    confidence: medium
    access_methods: [REST, MCP]

  - id: slack.search_files
    object: File
    action: search_files
    id_form: capability
    description: "Search files"
    category: Conversations
    risk: high
    business_impact: "Surfaces files shared in any conversation the user can see; file content can include PII, credentials, or regulated data."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2, ISO_27001]
    sod_concern: false
    confidence: medium
    access_methods: [REST, MCP]

  # ---------- Canvases ----------
  - id: slack.write_canvas
    object: Canvas
    action: write_canvas
    id_form: capability
    description: "Create/update a canvas"
    category: Canvases
    risk: medium
    business_impact: "Writes durable workspace documents; persists agent output beyond a single message and may be visible to many members."
    compliance: [SOC2, ISO_27001]
    sod_concern: false
    confidence: medium
    access_methods: [REST, MCP]

  # ---------- Identity & Directory ----------
  - id: slack.read_user_profile
    object: UserProfile
    action: read_user_profile
    id_form: capability
    description: "Read user profile/email"
    category: Identity & Directory
    risk: medium
    business_impact: "Returns a user's profile and email; single-record PII read."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA]
    sod_concern: false
    confidence: medium
    access_methods: [REST, MCP]

  - id: slack.search_users
    object: User
    action: search_users
    id_form: capability
    description: "Search users"
    category: Identity & Directory
    risk: medium
    business_impact: "Enumerates workspace members with profile/email matches; bulk surface of directory PII."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2, ISO_27001]
    sod_concern: false
    confidence: medium
    access_methods: [REST, MCP]
