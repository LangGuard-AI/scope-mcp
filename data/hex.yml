  - id: hex.search_projects
    object: Project
    action: search_projects
    category: Data Analytics
    risk: low
    business_impact: "Finds Hex projects in the workspace by name or content."
    compliance: [SOC2]
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  - id: hex.create_thread
    object: Thread
