    sod_concern: false
    confidence: medium
    access_methods: [MCP]
  - id: hex.continue_thread
    object: Thread
    action: continue_thread
    category: Data Analytics
    risk: medium
    business_impact: "Adds a follow-up question to a Hex thread, potentially executing additional warehouse queries."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2]
    sod_concern: false
    confidence: medium
    access_methods: [MCP]