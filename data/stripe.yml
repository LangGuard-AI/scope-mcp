actions:
  # ---------- Financial ----------
  - id: stripe.create_invoice
    object: Invoice
    action: create_invoice
    category: Financial
    risk: critical
    business_impact: "Creates a billable invoice in Stripe; revenue recognition event tied to the GL."
    compliance: [SOX, COSO, PCI, SOC2, ISO_27001]
    sod_concern: true
    confidence: high
    access_methods: [REST, MCP]

  - id: stripe.create_invoice_item
    object: InvoiceItem
    action: create_invoice_item
    category: Financial
    risk: high
    business_impact: "Adds line items to a draft invoice; affects amount billed to the customer."
    compliance: [SOX, COSO, PCI, SOC2, ISO_27001]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP]

  - id: stripe.finalize_invoice
    object: Invoice
    action: finalize_invoice
    category: Financial
    risk: critical
    business_impact: "Locks the invoice and triggers payment collection; commits revenue."
    compliance: [SOX, COSO, PCI, SOC2, ISO_27001, PSD2]
    sod_concern: true
    confidence: high
    access_methods: [REST, MCP]

  - id: stripe.list_invoices
