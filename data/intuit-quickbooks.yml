schema_version: "1.2"
platform: intuit-quickbooks
display_name: Intuit QuickBooks
source: langguard-editorial
updated: "2026-05"
maintainer: https://quickbooks.intuit.com/learn-support/en-us
# NOTE: tool ids match Intuit's official open-source quickbooks-online-mcp-server
# (github.com/intuit/quickbooks-online-mcp-server). The Claude-distributed
# connector at claude.com/connectors/intuit-quickbooks is the hosted equivalent.
# This file curates the financial-statement and core CRUD tools an agent is
# most likely to invoke; lookup-table CRUD (terms, classes, departments,
# tax_codes/rates/agencies) and attachables are omitted as low-impact.
actions:
  # ---------- Financial ----------
  - id: intuit-quickbooks.create_invoice
    object: Invoice
    action: create_invoice
    category: Financial
    risk: critical
    business_impact: "Creates a billable obligation and revenue recognition event in the GL."
    compliance: [SOX, COSO, SOC2, ISO_27001]
    sod_concern: true
    confidence: medium
    access_methods: [REST, MCP]

  - id: intuit-quickbooks.update_invoice
    object: Invoice
    action: update_invoice
    category: Financial
    risk: critical
    business_impact: "Modifies a recorded invoice; alters recognized revenue and AR balance."
    compliance: [SOX, COSO, SOC2, ISO_27001]
    sod_concern: true
    confidence: medium
    access_methods: [REST, MCP]

  - id: intuit-quickbooks.delete_invoice
    object: Invoice
    action: delete_invoice
    category: Financial
    risk: critical
    business_impact: "Removes an invoice from the books; direct revenue and audit-trail impact."
    compliance: [SOX, COSO, SOC2, ISO_27001]
    sod_concern: true
    confidence: medium
    access_methods: [REST, MCP]

  - id: intuit-quickbooks.get_invoice
