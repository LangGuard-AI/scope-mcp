schema_version: "1.2"
platform: pagerduty
display_name: PagerDuty
source: langguard-editorial
updated: "2026-05"
server_website: https://github.com/PagerDuty/pagerduty-mcp-server
maintainer: https://community.pagerduty.com/
actions:
  # ---------- Incidents ----------
  - id: pagerduty.create_incident
    object: Incident
    action: create_incident
    category: Incidents
    risk: medium
    business_impact: "Pages on-call responders; mistaken creation wakes engineers."
    compliance: [SOC2, ISO_27001]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP]

  - id: pagerduty.get_incident
    object: Incident
    action: get_incident
    category: Incidents
    risk: low
    business_impact: "Returns details for a single incident."
