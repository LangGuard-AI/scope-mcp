schema_version: "1.2"
platform: zoom-for-claude
display_name: Zoom for Claude
source: langguard-editorial
updated: "2026-05"
maintainer: https://support.zoom.com/hc/en/contact?id=contact_us
actions:
  # ---------- Data Access ----------
  - id: zoom-for-claude.search_meetings
    object: Meeting
    action: search_meetings
    category: Data Access
    risk: high
    business_impact: "AI Companion semantic search across meeting content; can surface confidential discussions, deal terms, or HR conversations."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2, ISO_27001]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP]

  - id: zoom-for-claude.get_meeting_assets
    object: Meeting
    action: get_meeting_assets
    category: Data Access
    risk: high
    business_impact: "Retrieves meeting-linked assets including AI summaries and shared documents; can expose private conversation content."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2, ISO_27001]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP]

  - id: zoom-for-claude.get_recording_resource
    object: Recording
    action: get_recording_resource
    category: Data Access
    risk: high
    business_impact: "Pulls recording resources (video, audio, transcript) for a meeting; transcripts may contain PHI, financial figures, or other regulated content."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, HIPAA, SOC2, ISO_27001]
    sod_concern: false
    confidence: medium
    access_methods: [REST, MCP]

  - id: zoom-for-claude.recordings_list
    object: Recording
    action: recordings_list
    category: Data Access
    risk: medium
    business_impact: "Enumerates a user's cloud recordings; metadata-level disclosure that supports downstream content retrieval."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP]

