    sod_concern: false
    confidence: high
    access_methods: [REST, MCP, CLI]

  - id: gitlab.semantic_code_search
    object: Code
    action: semantic_code_search
    category: Search
    risk: medium
    business_impact: "Semantic search across source; aggregates code context across repos and may expose secrets-in-code or IP."
    compliance: [SOC2, ISO_27001]
    sod_concern: false
    confidence: medium
    access_methods: [REST, MCP, CLI]

  # ---------- Platform ----------
  - id: gitlab.get_mcp_server_version
