    sod_concern: false
    confidence: high
    access_methods: [REST, MCP, CLI]

  - id: gitlab.get_pipeline_jobs
    object: Job
    action: get_pipeline_jobs
    category: Pipelines
    risk: low
    business_impact: "Reads CI job metadata and status."
    compliance: []
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP, CLI]

  - id: gitlab.manage_pipeline
    object: Pipeline
    action: manage_pipeline
    category: Pipelines
    risk: high
    business_impact: "Creates, retries, or cancels CI/CD pipelines; can trigger or block production deployments."
    compliance: [SOX, COSO, SOC2, ISO_27001, NIST_CSF]
    sod_concern: true
    confidence: medium
    access_methods: [REST, MCP, CLI]

