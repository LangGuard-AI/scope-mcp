  - id: gitlab.create_merge_request
    object: MergeRequest
    action: create_merge_request
    category: Code & Release
    risk: medium
    business_impact: "Opens a merge request; entry point to production code change."
    compliance: [SOC2, ISO_27001]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP, CLI]

  - id: gitlab.get_merge_request
    object: MergeRequest
    action: get_merge_request
    category: Code & Release
    risk: low
    business_impact: "Reads merge request metadata and description."
    compliance: []
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP, CLI]

  - id: gitlab.get_merge_request_commits
    object: MergeRequest
    action: get_merge_request_commits
    category: Code & Release
    risk: low
    business_impact: "Lists commits attached to a merge request."
    compliance: []
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP, CLI]

  - id: gitlab.get_merge_request_diffs
    object: MergeRequest
    action: get_merge_request_diffs
    category: Code & Release
    risk: medium
    business_impact: "Reads code diffs; can surface secrets, customer data, or proprietary logic embedded in source."
    compliance: [SOC2, ISO_27001]
