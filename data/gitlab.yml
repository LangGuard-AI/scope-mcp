  - id: gitlab.search
    object: "*"
    action: search
    category: Search
    risk: medium
    business_impact: "Search across the GitLab instance; can surface code, issues, and merge requests beyond the agent's intended scope."
    compliance: [SOC2, ISO_27001]
    sod_concern: false
