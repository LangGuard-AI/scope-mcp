schema_version: "1.1"
platform: github
display_name: GitHub
source: langguard-editorial
updated: "2026-05"
reference: https://github.com/github/github-mcp-server
actions:
  # ---------- Repositories ----------
  - id: github.create_or_update_file
    object: File
    action: create_or_update_file
    description: "Creates a new file or replaces an existing file's contents in a repository on a chosen branch."
    category: Repository
    risk: medium
    business_impact: "Writes file content directly to a branch; combined with merge_pull_request, this lets an agent ship code without going through PR review."
    compliance: [SOX, COSO, SOC2, ISO_27001]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP, CLI]

  - id: github.delete_file
    object: File
    action: delete_file
    description: "Deletes a single file from a repository branch via direct commit."
    category: Repository
    risk: medium
    business_impact: "Removes a file from a branch via direct commit; reversible from history but bypasses PR review when used outside a feature branch."
    compliance: [SOX, COSO, SOC2, ISO_27001]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP, CLI]

  - id: github.push_files
    object: File
    action: push_files
    description: "Pushes multiple file additions or updates to a branch in a single commit."
    category: Repository
    risk: medium
    business_impact: "Commits a batch of file changes directly to a branch; combined with merge_pull_request, this enables ship-without-review."
    compliance: [SOX, COSO, SOC2, ISO_27001]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP, CLI]

  - id: github.create_branch
    object: Branch
    action: create_branch
    description: "Creates a new branch in a repository from a given base ref."
    category: Repository
    risk: medium
    business_impact: "Creates a new branch in the repository; pre-condition for direct-write workflows that bypass PR review."
    compliance: [SOC2, ISO_27001]
    sod_concern: false
    confidence: high
    access_methods: [REST, MCP, CLI]

