schema_version: "1.2"
platform: notion
display_name: Notion
source: langguard-editorial
updated: "2026-05"
server_version: "2026-05"
server_website: https://developers.notion.com/docs/mcp
maintainer: https://www.notion.com/help
reference: https://developers.notion.com/guides/mcp/mcp-supported-tools
actions:
  # ---------- Discovery ----------
  - id: notion.notion-search
    object: "*"
    action: notion-search
    description: "Search across your Notion workspace and connected tools like Slack, Google Drive, and Jira."
    category: Data Access
    risk: high
    business_impact: "Bulk cross-system search across the workspace and connected SaaS tools; surfaces confidential material at scale."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2]
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  - id: notion.notion-fetch
    object: "*"
    action: notion-fetch
    description: "Retrieves content from Notion pages, databases, or data sources by URL or ID."
    category: Data Access
    risk: medium
    business_impact: "Retrieves the full content of a page, database, or block by URL or id."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2]
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  # ---------- Pages ----------
  - id: notion.notion-create-pages
    object: Page
    action: notion-create-pages
    description: "Creates one or more Notion pages with specified properties and content."
    category: Data Access
    risk: low
    business_impact: "Creates one or more pages in the workspace."
    compliance: []
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  - id: notion.notion-update-page
    object: Page
    action: notion-update-page
    description: "Modifies a page's properties, content, icon, or cover image."
    category: Data Access
    risk: medium
    business_impact: "Edits page properties or content; can overwrite knowledge-base material."
    compliance: [SOC2]
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  - id: notion.notion-move-pages
    object: Page
    action: notion-move-pages
    description: "Move one or more Notion pages or databases to a new parent."
    category: Data Access
    risk: medium
    business_impact: "Relocates pages within the workspace tree; can change visibility/inheritance."
    compliance: [SOC2, ISO_27001]
    sod_concern: false
    confidence: medium
    access_methods: [MCP]
  - id: notion.notion-duplicate-page
    object: Page
    action: notion-duplicate-page
    description: "Duplicate a Notion page within your workspace."
    category: Data Access
    risk: low
    business_impact: "Creates a copy of an existing page; may duplicate sensitive content into a new location."
    compliance: [SOC2]
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  # ---------- Databases ----------
  - id: notion.notion-create-database
    object: Database
    action: notion-create-database
    description: "Creates a new Notion database, initial data source, and initial view."
    category: Data Access
    risk: low
    business_impact: "Creates a new database with a defined schema."
    compliance: []
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  - id: notion.notion-update-data-source
    object: DataSource
    action: notion-update-data-source
    description: "Updates a data source's properties, name, description, or attributes."
    category: Data Access
    risk: medium
    business_impact: "Modifies database/data-source schema; can break dependent views and integrations."
    compliance: [SOC2]
    sod_concern: false
    confidence: medium
    access_methods: [MCP]
  - id: notion.notion-create-view
    object: View
    action: notion-create-view
    description: "Generates new views (table, board, list, calendar, timeline, gallery, form, chart, map, dashboard)."
    category: Data Access
    risk: low
    business_impact: "Adds a new view to a database; presentation-layer change."
    compliance: []
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  - id: notion.notion-update-view
    object: View
    action: notion-update-view
    description: "Modifies a view's name, filters, sorts, or display configuration."
    category: Data Access
    risk: low
    business_impact: "Edits an existing database view's filters or columns."
    compliance: []
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  - id: notion.notion-query-data-sources
    object: DataSource
    action: notion-query-data-sources
    description: "Queries multiple data sources with structured summaries and filtering."
    category: Data Access
    risk: high
    business_impact: "Bulk multi-data-source query with filters; can return large volumes of rows containing PII."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2]
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  - id: notion.notion-query-database-view
    object: View
    action: notion-query-database-view
    description: "Retrieves data from a database using a pre-defined view's filters and sorts."
    category: Data Access
    risk: medium
    business_impact: "Returns rows visible through a specific database view."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA]
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  # ---------- Comments ----------
  - id: notion.notion-create-comment
    object: Comment
    action: notion-create-comment
    description: "Add a comment to a page or specific content."
    category: Data Access
    risk: low
    business_impact: "Posts a comment on a page or block under the authenticated user's identity."
    compliance: []
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  - id: notion.notion-get-comments
    object: Comment
    action: notion-get-comments
    description: "Lists all comments and discussions on a page."
    category: Data Access
    risk: low
    business_impact: "Reads comments on pages or blocks; may contain user-generated PII."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA]
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  # ---------- Identity & Access ----------
  - id: notion.notion-get-teams
    object: Team
    action: notion-get-teams
    description: "Retrieves a list of teams (teamspaces) in the current workspace."
    category: Identity & Access
    risk: low
    business_impact: "Reads team / teamspace membership in the workspace."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA]
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  - id: notion.notion-get-users
    object: User
    action: notion-get-users
    description: "Lists all users in the workspace with their details."
    category: Identity & Access
    risk: medium
    business_impact: "Enumerates the workspace user directory including names and emails."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA, SOC2]
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  - id: notion.notion-get-user
    object: User
    action: notion-get-user
    description: "Retrieves an individual user's information by ID."
    category: Identity & Access
    risk: low
    business_impact: "Reads a single user record including name and email."
    compliance: [GDPR, UK_GDPR, CCPA, PIPEDA, LGPD, APPI, PIPL, POPIA]
    sod_concern: false
    confidence: high
    access_methods: [MCP]
  - id: notion.notion-get-self
    object: User
    action: notion-get-self
    description: "Retrieves bot user information and connected workspace details."
    category: Identity & Access
    risk: low
    business_impact: "Reads the authenticated bot/user's own profile."
    compliance: []
    sod_concern: false
    confidence: high
    access_methods: [MCP]
