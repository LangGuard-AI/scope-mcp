# NOTE: The Wix MCP server uses one generic dispatcher tool, CallWixSiteAPI,
# that calls any Wix REST/SDK method on a site. Effective blast radius for
# that tool is the union of the connected business solutions (Stores,
# Bookings, Forms, CRM, etc.). Per-API methods invoked via CallWixSiteAPI
# fall through to platform-level matching.
